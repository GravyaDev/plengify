services:
  platform-api:
    build: ./platform-api
    restart: unless-stopped
    environment:
      - 'PUBLIC_IP=${PUBLIC_IP}'
      - 'BASE_DOMAIN=${BASE_DOMAIN}'
      - 'WEB_UI_PASSWORD=${WEB_UI_PASSWORD:-admin}'
      - 'DATABASE_PATH=/data/pleng.db'
      - 'PROJECTS_DIR=/opt/pleng/projects'
      - 'GITHUB_TOKEN=${GITHUB_TOKEN}'
      - 'TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}'
      - 'TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/pleng/projects:/opt/pleng/projects
      - /opt/pleng/backups:/opt/pleng/backups
      - platform_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health', timeout=3)"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  agent:
    build: ./agent
    restart: unless-stopped
    environment:
      - 'ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?API key required}'
      - 'CLAUDE_AUTH_MODE=${CLAUDE_AUTH_MODE:-oauth}'
      - 'MODEL_NAME=${MODEL_NAME:-claude-sonnet-4-20250514}'
      - 'PLATFORM_API_URL=http://platform-api:8000'
      - 'PROJECTS_DIR=/opt/pleng/projects'
    volumes:
      - /opt/pleng/projects:/opt/pleng/projects
      - /root/.claude:/home/claude/.claude
      - /root/.claude.json:/tmp/.claude.json.host:ro
    depends_on:
      platform-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  telegram-bot:
    build: ./telegram-bot
    restart: unless-stopped
    environment:
      - 'TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?Token required}'
      - 'TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:?Chat ID required}'
      - 'AGENT_URL=http://agent:8000'
      - 'PLATFORM_API_URL=http://platform-api:8000'
      - 'PROJECTS_DIR=/opt/pleng/projects'
    volumes:
      - /opt/pleng/projects:/opt/pleng/projects
    depends_on:
      agent:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    depends_on:
      platform-api:
        condition: service_healthy
    ports:
      - '8080:80'

volumes:
  platform_data: null
